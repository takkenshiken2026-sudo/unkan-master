sections:
  # section 1 から始める。「この記事でわかること」は書かない
  - heading: 講座を検討するタイミング
    body: |
      独学で過去問演習を進めても、特定分野の理解が進まない・質問先がない場合はオンライン講座の検討タイミングです。
      講座は必須ではなく、弱点補強と学習習慣づくりの選択肢として位置づけます。
  - heading: 比較する項目（カリキュラム・質問・価格）
    body: |
      比較では①出題範囲との対応、②動画量と演習、③質問サポート、④料金体系（月額/一括）を確認します。
      キャンペーン価格だけでなく、通常料金・更新条件・受講期限を公式ページで照合してください。
  - heading: 1位の講座の特徴
    body: |
      【講座A・買い切り型】◯◯試験 合格講座（【提供会社A】・49,800円一括参考・受講12か月・150時間）。
      全分野を動画で網羅し、確認テスト付き。独学の土台ができている人が弱点分野を効率よく埋める用途に向きます。
      向いている人: まとまった時間を確保でき、一括でコストを抑えたい人。
  - heading: 2位の講座の特徴
    body: |
      【講座B・月額型】◯◯試験 オンライン講座（【提供会社B】・月額9,800円参考・最短3か月〜）。
      月額のため受験直前まで必要な期間だけ契約しやすく、スマホ視聴に強い構成です。
      向いている人: 仕事の繁忙期に合わせて学習量を調整したい人。
  - heading: 独学との役割分担
    body: |
      当サイトの過去問・用語解説は無料で利用できます。講座は「理解の補助」、過去問は「定着と弱点洗い出し」に使うと費用対効果が高まります。
      週の学習時間のうち、講座視聴と過去問演習の比率を先に決めてから申し込むと続けやすいです。
  - heading: 申込前のチェックリスト
    body: |
      公式ページで通常料金・キャンペーン条件・返金/解約規定・受講期限を確認してください。
      無料体験がある場合は、自分の弱点分野の動画を1本視聴し、説明の分かりやすさを確かめてから判断することをおすすめします。
  - heading: 過去問演習との組み合わせ
    body: |
      講座で学んだ章を、同週に当サイトの過去問で確認するサイクルが効果的です。
      間違えた設問は用語解説で補強し、翌週も同じ分野を講座動画で復習する流れを推奨します。

faqs:
  - question: 独学だけでは不十分ですか？
    answer: |
      学習スタイルによります。過去問演習で自力に理解できる分野が多い場合は独学のみでも可能です。
      説明を聞きたい・質問したい場合は講座を検討してください。
  - question: キャンペーン価格は信頼できますか？
    answer: |
      キャンペーンは期間限定のことが多いです。申込前に公式の通常価格と条件を必ず確認し、
      執筆日と異なる場合は最新情報を優先してください。

