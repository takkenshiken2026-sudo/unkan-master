user_intent: |
  本記事を読むと、◯◯試験向けオンライン講座の選び方と、
  候補ごとの向き不向き・独学との役割分担が分かります。

action_items: |
  比較表で2講座の違いを確認する;
  無料体験または公式資料でカリキュラムを確認する;
  このサイトの過去問で弱点分野を把握する

key_points: 選び方の基準;独学との併用

