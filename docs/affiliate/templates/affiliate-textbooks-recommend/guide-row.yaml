sections:
  # section 1 から始める。「この記事でわかること」は書かない（ビルドでスキップ対象）
  - heading: テキスト選びの3つのポイント
    body: |
      ◯◯試験のテキスト選びでは、①公式テキスト・受験要項の出題範囲と目次が一致しているか、
      ②解説の量が自分の前提知識に合うか、③問題集・過去問とセットで使えるかを確認します。
      試験実施団体（公式）の範囲改定がある年度は、版表示を必ず確認してください。
  - heading: おすすめテキスト比較の見方
    body: |
      比較では「薄いが網羅」「厚いが丁寧」「演習寄り」のように、学習フェーズごとの役割で見ます。
      独学初期は理解用1冊に絞り、過去問演習が進んだ段階で問題集を追加する構成が扱いやすいです。
      当サイトの過去問一覧で分野別の正答率を確認し、足りない分野の解説量を基準に選んでください。
  - heading: 1位のテキストの特徴
    body: |
      【2026年度版 ◯◯試験 完全攻略テキスト】（学習支援出版・3,080円税込参考・512ページ・A5判）。
      初学者向けに章立てが整理されており、用語の定義から事例まで段階的に読めます。
      向いている人: 資格学習が初めてで、テキスト1冊から始めたい人。
      同一シリーズの問題集（別売）と章番号が対応するため、理解→演習の流れが作りやすいです。
      購入前に目次と試験実施団体（公式）の出題範囲を突き合わせ、最新版かどうかを確認してください。
  - heading: 2位のテキストの特徴
    body: |
      【2026 ◯◯試験 要点整理テキスト】（資格試験Press・2,420円税込参考・368ページ・B5判）。
      要点整理と章末確認問題（計420問）が多く、復習サイクルを回しやすい構成です。
      向いている人: ある程度基礎があり、過去問と並行して素早く全体をなぞり直したい人。
      価格・付属資料は販売ページの表記が正本です。
  - heading: 3位のテキストの特徴
    body: |
      【2026 ◯◯試験 イラストで理解するテキスト】（みんなの資格Books・2,750円税込参考・448ページ・A5判）。
      図表や1見開き1テーマの構成で、イメージで記憶したい人向けです。模擬問題80問付き。
      向いている人: 暗記が苦手で図解を好む人、または試験直前に1冊に集約したい人。
      他2冊と範囲が重複する場合は、演習量の確保を優先して1冊に絞ることをおすすめします。
  - heading: 問題集との組み合わせ
    body: |
      テキストだけでなく、同一シリーズの『2026年度版 ◯◯試験 完全攻略問題集』や年度別過去問集を組み合わせると復習効率が上がります。
      例えば『2026年度版 ◯◯試験 完全攻略テキスト』で理解した章を、問題集でそのまま確認できます。
      テキストで理解→演習で確認→間違えた論点を用語解説で補強、の順で回してください。
      問題集URLはテキストと別ASINのことが多いので、リンクの取り違えに注意してください。
  - heading: 無料コンテンツとの併用
    body: |
      このサイトの過去問演習・用語解説は無料で利用できます。有料テキストは「理解の土台」、
      無料コンテンツは「定着と弱点洗い出し」に使うと、教材費を抑えつつ学習できます。
      まず過去問で現在地を把握し、テキストで補強すべき分野を決めてから購入する進め方も有効です。

faqs:
  - question: テキストは1冊で足りますか？
    answer: |
      学習段階によります。初めの1〜2か月は理解用テキスト1冊に絞り、
      過去問演習が進んだら問題集を追加する方法が一般的です。
      出題範囲と自分の弱点は、公式情報と当サイトの演習で確認してください。
  - question: 最新年度版は必要ですか？
    answer: |
      制度改定や出題範囲の変更がある試験では、年度版・改訂版の有無を
      試験実施団体（公式）で確認してください。版が新しくても、
      自分の学習フェーズに合わない解説量の場合は別候補を検討して構いません。

