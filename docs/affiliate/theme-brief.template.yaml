# アフィリエイト記事テーマ入力（このファイルをコピーして data/affiliate-briefs/{slug}.yaml に保存）
#
# 紹介対象は「書籍（books）」と「講座・サービス（courses）」の2系統。
# 完成テンプレ:
#   - docs/affiliate/templates/affiliate-textbooks-recommend/  … 書籍
#   - docs/affiliate/templates/affiliate-online-course-compare/ … 講座

# 必須
slug: affiliate-your-topic-slug
theme_key: textbooks-recommend           # scaffold --list-themes のキー
search_intent: 独学向けにおすすめのテキストを比較して選びたい

# 任意（省略時は theme_key から自動補完）
title: ◯◯試験のおすすめテキスト3選【独学・初心者向け】
genre: 独学対策
layout: product-comparison               # csv | product-comparison
asp_primary: amazon                      # amazon | a8 | afb | internal | mixed
comparison_kind: books                     # books | courses

comparison_title: おすすめテキスト3選（比較）
price_disclaimer: 価格は執筆時点のAmazon参考。購入前に販売ページで確認してください。

# --- 書籍（offer_type: book）の例 ---
products:
  - rank: 1
    offer_type: book
    name: 【商品名・年度版】
    publisher: 出版社名
    edition: 2026年改訂
    price_yen: 3080
    price_note: Amazon税込・送料別
    pages: 480
    format: A5判
    asin: B0XXXXXXXXXX
    image_file: exam-slug-textbook-a-2026.webp
    amazon_url: https://amzn.to/xxxxxxxx
    workbook_name: 【問題集名】
    workbook_image_file: exam-slug-textbook-a-workbook-2026.webp
    workbook_amazon_url: https://amzn.to/yyyyyyyy
    for_who: 初学者で基礎から入りたい人
    highlights:
      - 【訴求ポイント1】
      - 【訴求ポイント2】

